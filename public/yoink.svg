<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="f">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#08080f"/>
  <!-- Glow halo -->
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!--
    Crown-Dagger mark centred in 64×64:
    Viewbox maps 40×40 icon → translate(12,6) scale(1.0)
    Then scaled to fit nicely with breathing room
  -->
  <g transform="translate(6, 4) scale(1.3)" filter="url(#f)">
    <!-- Crown dagger shape -->
    <path
      d="M4 28 L4 18 L10 22 L14 8 L20 14 L20 6 L20 14 L26 8 L30 22 L36 18 L36 28
         L30 28 L28 34 L26 28 L20 28 L20 36 L20 28 L14 28 L12 34 L10 28 Z"
      fill="url(#cg)"
      stroke="#FFE566"
      stroke-width="0.5"
      stroke-linejoin="round"
    />
    <!-- Center ruby jewel -->
    <circle cx="20" cy="18" r="3" fill="#FF1744" stroke="#FFE566" stroke-width="0.5"/>
    <circle cx="19" cy="17" r="1" fill="white" opacity="0.5"/>
    <!-- Left sapphire -->
    <circle cx="11" cy="20" r="1.8" fill="#7000FF" stroke="#FFE566" stroke-width="0.4" opacity="0.9"/>
    <!-- Right emerald -->
    <circle cx="29" cy="20" r="1.8" fill="#00C853" stroke="#FFE566" stroke-width="0.4" opacity="0.9"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="vg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <filter id="gf">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#08080f"/>

  <!-- Outer glow -->
  <polygon points="32,5.5 50.5,16 50.5,38 32,48.5 13.5,38 13.5,16"
    fill="url(#glow)"/>

  <!-- Hexagon frame -->
  <polygon points="32,7 49,17.5 49,38.5 32,49 15,38.5 15,17.5"
    fill="rgba(8,8,15,0.97)"
    stroke="url(#vg)"
    stroke-width="2.2"
    stroke-linejoin="round"/>

  <!-- Inner hex ring -->
  <polygon points="32,13 43.5,20 43.5,34 32,41 20.5,34 20.5,20"
    fill="none"
    stroke="#FFD700"
    stroke-width="0.7"
    stroke-opacity="0.22"
    stroke-linejoin="round"/>

  <!-- Eye white -->
  <path d="M20 28 Q32 18 44 28 Q32 38 20 28 Z"
    fill="rgba(8,8,15,0.92)"
    stroke="#FFD700"
    stroke-width="1.5"
    stroke-linejoin="round"/>

  <!-- Pupil coin -->
  <circle cx="32" cy="28" r="5.8"
    fill="url(#vg)"
    filter="url(#gf)"/>
  <circle cx="32" cy="28" r="3.4"
    fill="rgba(8,8,15,0.75)"
    stroke="#FFE566"
    stroke-width="1"/>
  <circle cx="32" cy="28" r="1.1" fill="#FFE566"/>

  <!-- Slit iris -->
  <ellipse cx="32" cy="28" rx="1.6" ry="4.5"
    fill="url(#slit)"
    opacity="0.88"/>

  <!-- Highlight -->
  <circle cx="29.8" cy="25.5" r="0.9" fill="white" opacity="0.65"/>
</svg>
